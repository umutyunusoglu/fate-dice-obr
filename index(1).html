<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Emperor's Tarot — Fate Dice</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --void: #0d0b09;
    --stone: #1b1511;
    --stone-2: #241c15;
    --line: #3a2f22;
    --bone: #e6dcc0;
    --bone-dim: #9c917a;
    --gold: #c9a44c;
    --gold-dim: #7d6530;
    --blood: #b03a2e;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(ellipse at 50% -20%, #2a2118 0%, transparent 55%),
      var(--void);
    color: var(--bone);
    font: 14px/1.5 Georgia, "Times New Roman", serif;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }
  h1 {
    font-family: Cinzel, Georgia, serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
  }
  h1 small {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--bone-dim);
    margin-top: 2px;
  }
  .rule {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  /* ---- Tarot cards ---- */
  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
    perspective: 700px;
  }
  .card { aspect-ratio: 2 / 3; }
  .card .inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.2,.7,.3,1);
  }
  .card.revealed .inner { transform: rotateY(180deg); }
  .card.rolling .inner { animation: sway 0.5s ease-in-out infinite; }
  @keyframes sway {
    0%, 100% { transform: rotateY(0deg) rotateZ(-2deg); }
    50%      { transform: rotateY(24deg) rotateZ(2deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .card .inner { transition: none; }
    .card.rolling .inner { animation: none; }
  }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius);
    border: 1px solid var(--gold-dim);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .face.back {
    background:
      radial-gradient(circle at 50% 50%, #241b12 0%, #14100b 70%);
  }
  .face.back svg { width: 55%; opacity: 0.9; }
  .face.front {
    transform: rotateY(180deg);
    background: linear-gradient(170deg, var(--stone-2), var(--stone));
    padding: 6px 4px 5px;
    gap: 4px;
  }
  .face.front .sigil { width: 62%; flex: 1; display: grid; place-items: center; }
  .face.front .sigil svg { width: 100%; height: auto; }
  .face.front .card-name {
    font-family: Cinzel, Georgia, serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.25;
    color: var(--bone-dim);
  }
  .card.v-plus  .face.front { border-color: var(--gold); }
  .card.v-plus  .card-name  { color: var(--gold); }
  .card.v-minus .face.front { border-color: var(--blood); }
  .card.v-minus .card-name  { color: var(--blood); }

  /* ---- Result ---- */
  .result {
    text-align: center;
    background: linear-gradient(180deg, var(--stone), #171209);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
    min-height: 78px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .result .total {
    font-family: Cinzel, Georgia, serif;
    font-size: 30px;
    font-weight: 900;
    color: var(--bone);
  }
  .result .total.pos { color: var(--gold); }
  .result .total.neg { color: var(--blood); }
  .result .ladder {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--bone-dim);
  }
  .result .empty { color: var(--bone-dim); font-style: italic; font-size: 13px; }

  /* ---- Controls ---- */
  .controls { display: flex; gap: 10px; align-items: stretch; }
  .mod {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    background: var(--stone);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .mod button {
    width: 32px; height: 100%;
    background: none; border: none;
    color: var(--bone-dim); font-size: 18px; cursor: pointer;
    font-family: Georgia, serif;
  }
  .mod button:hover { color: var(--gold); background: var(--stone-2); }
  .mod .value {
    min-width: 58px;
    text-align: center;
    font-family: Cinzel, Georgia, serif;
    font-weight: 700;
    font-size: 15px;
  }
  .mod .value small {
    display: block; font-family: Georgia, serif; font-weight: 400;
    font-size: 9px; color: var(--bone-dim);
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  #rollBtn {
    flex: 1;
    background: linear-gradient(180deg, #d8b45e, #a8823a);
    color: #1a1206;
    border: 1px solid var(--gold);
    border-radius: var(--radius);
    font-family: Cinzel, Georgia, serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.12em;
    cursor: pointer;
    padding: 12px 6px;
    text-transform: uppercase;
  }
  #rollBtn:hover { filter: brightness(1.1); }
  #rollBtn:disabled { opacity: 0.55; cursor: wait; }
  #rollBtn:focus-visible, .mod button:focus-visible {
    outline: 2px solid var(--gold); outline-offset: 2px;
  }

  /* ---- History ---- */
  .history h2 {
    font-family: Cinzel, Georgia, serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--bone-dim);
    margin-bottom: 6px;
    text-align: center;
  }
  #log { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  #log li {
    background: var(--stone);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
  }
  #log .who { font-weight: 700; color: var(--bone); }
  #log .faces { color: var(--bone-dim); letter-spacing: 0.15em; font-weight: 700; }
  #log .sum { margin-left: auto; font-family: Cinzel, Georgia, serif; font-weight: 700; }
  #log .sum.pos { color: var(--gold); }
  #log .sum.neg { color: var(--blood); }
  #log .none { color: var(--bone-dim); border-style: dashed; justify-content: center; font-style: italic; }
</style>
</head>
<body>
  <h1>The Emperor's Tarot<small>4dF · Fate Dice</small></h1>
  <div class="rule"></div>

  <div class="cards" aria-label="Dice">
    <div class="card" id="c0"><div class="inner">
      <div class="face back"></div><div class="face front"></div>
    </div></div>
    <div class="card" id="c1"><div class="inner">
      <div class="face back"></div><div class="face front"></div>
    </div></div>
    <div class="card" id="c2"><div class="inner">
      <div class="face back"></div><div class="face front"></div>
    </div></div>
    <div class="card" id="c3"><div class="inner">
      <div class="face back"></div><div class="face front"></div>
    </div></div>
  </div>

  <div class="result" id="result" aria-live="polite">
    <div class="empty">The cards await. Consult the Tarot.</div>
  </div>

  <div class="controls">
    <div class="mod">
      <button id="modDown" aria-label="Decrease skill modifier">−</button>
      <div class="value"><span id="modValue">+0</span><small>Skill</small></div>
      <button id="modUp" aria-label="Increase skill modifier">+</button>
    </div>
    <button id="rollBtn">Consult the Tarot</button>
  </div>

  <div class="history">
    <h2>Litany of Castings</h2>
    <ul id="log"><li class="none">No castings yet</li></ul>
  </div>

<script type="module">
  import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@3/+esm";

  const CHANNEL = "tr.fate-dice/roll";
  const LADDER = {
    "8": "Legendary", "7": "Epic", "6": "Fantastic", "5": "Superb",
    "4": "Great", "3": "Good", "2": "Fair", "1": "Average",
    "0": "Mediocre", "-1": "Poor", "-2": "Terrible"
  };
  const SYMBOL = { "-1": "−", "0": "▢", "1": "+" };

  // Original grimdark sigils, one per Fate face
  const SIGILS = {
    // +1 · The Emperor — a radiant throne-star
    "1": `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#c9a44c" stroke-width="2.2" stroke-linecap="round">
      <circle cx="30" cy="30" r="9"/>
      <path d="M30 6v10M30 44v10M6 30h10M44 30h10M13 13l7 7M40 40l7 7M47 13l-7 7M20 40l-7 7"/>
      <path d="M26 30l3-5 3 5-3 5z" fill="#c9a44c" stroke="none"/>
    </svg>`,
    // 0 · The Pilgrim — a hooded wanderer beneath a waning moon
    "0": `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#9c917a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 50c0-14 5-24 12-28 7 4 12 14 12 28"/>
      <path d="M24 50c0-8 2-14 6-17 4 3 6 9 6 17"/>
      <path d="M44 12a7 7 0 0 1-8 8 8 8 0 1 0 8-8z" fill="#9c917a" stroke="none" opacity="0.8"/>
    </svg>`,
    // −1 · The Despoiler — a shattered skull-brand
    "-1": `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#b03a2e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 8c-10 0-16 7-16 16 0 6 3 10 6 12v8h20v-8c3-2 6-6 6-12 0-9-6-16-16-16z"/>
      <circle cx="24" cy="26" r="3" fill="#b03a2e" stroke="none"/>
      <circle cx="36" cy="26" r="3" fill="#b03a2e" stroke="none"/>
      <path d="M26 44v-5M30 44v-6M34 44v-5"/>
      <path d="M8 8l10 12M52 52L42 40" stroke-width="2.6"/>
    </svg>`
  };
  const CARD_NAMES = { "1": "The Emperor", "0": "The Pilgrim", "-1": "The Despoiler" };
  const CARD_BACK = `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#7d6530" stroke-width="1.6">
      <rect x="10" y="10" width="40" height="40" transform="rotate(45 30 30)"/>
      <rect x="17" y="17" width="26" height="26" transform="rotate(45 30 30)"/>
      <circle cx="30" cy="30" r="4" fill="#7d6530" stroke="none"/>
    </svg>`;

  let playerName = "Acolyte";
  let modifier = 0;
  let rolling = false;

  const $ = (id) => document.getElementById(id);
  const cardEls = [$("c0"), $("c1"), $("c2"), $("c3")];
  const fmt = (n) => (n >= 0 ? "+" + n : String(n));
  const ladderName = (n) => LADDER[String(Math.max(-2, Math.min(8, n)))] ?? "";

  cardEls.forEach((c) => { c.querySelector(".back").innerHTML = CARD_BACK; });

  function setCard(el, v) {
    const key = String(v);
    el.classList.remove("v-plus", "v-minus");
    if (v === 1) el.classList.add("v-plus");
    if (v === -1) el.classList.add("v-minus");
    el.querySelector(".front").innerHTML =
      `<div class="sigil">${SIGILS[key]}</div>` +
      `<div class="card-name">${CARD_NAMES[key]}</div>`;
  }

  function showResult(total) {
    const cls = total > 0 ? "pos" : total < 0 ? "neg" : "";
    $("result").innerHTML =
      `<div class="total ${cls}">${fmt(total)}</div>` +
      `<div class="ladder">${ladderName(total)}</div>`;
  }

  function addLog({ name, dice, mod, total }) {
    const log = $("log");
    log.querySelector(".none")?.remove();
    const li = document.createElement("li");
    const cls = total > 0 ? "pos" : total < 0 ? "neg" : "";
    const faces = dice.map((d) => SYMBOL[String(d)]).join(" ");
    li.innerHTML =
      `<span class="who"></span>` +
      `<span class="faces">${faces}</span>` +
      `<span>${fmt(mod)}</span>` +
      `<span class="sum ${cls}">${fmt(total)} · ${ladderName(total)}</span>`;
    li.querySelector(".who").textContent = name;
    log.prepend(li);
    while (log.children.length > 8) log.lastElementChild.remove();
  }

  function rollFate() {
    return Array.from({ length: 4 }, () => Math.floor(Math.random() * 3) - 1);
  }

  async function doRoll() {
    if (rolling) return;
    rolling = true;
    $("rollBtn").disabled = true;

    // Turn cards face-down and shuffle
    cardEls.forEach((el) => { el.classList.remove("revealed"); el.classList.add("rolling"); });
    await new Promise((r) => setTimeout(r, 750));

    const dice = rollFate();
    // Reveal one by one
    for (let i = 0; i < 4; i++) {
      cardEls[i].classList.remove("rolling");
      setCard(cardEls[i], dice[i]);
      cardEls[i].classList.add("revealed");
      await new Promise((r) => setTimeout(r, 140));
    }

    const total = dice.reduce((a, b) => a + b, 0) + modifier;
    showResult(total);

    const payload = { name: playerName, dice, mod: modifier, total };
    addLog(payload);

    if (OBR.isAvailable) {
      try {
        await OBR.broadcast.sendMessage(CHANNEL, payload);
        await OBR.notification.show(
          `☠ ${playerName} consults the Tarot: ${fmt(total)} (${ladderName(total)})`,
          total >= 0 ? "SUCCESS" : "WARNING"
        );
      } catch (e) { console.error(e); }
    }

    rolling = false;
    $("rollBtn").disabled = false;
  }

  function setModifier(m) {
    modifier = Math.max(-4, Math.min(8, m));
    $("modValue").textContent = fmt(modifier);
  }

  $("rollBtn").addEventListener("click", doRoll);
  $("modUp").addEventListener("click", () => setModifier(modifier + 1));
  $("modDown").addEventListener("click", () => setModifier(modifier - 1));

  if (OBR.isAvailable) {
    OBR.onReady(async () => {
      try { playerName = await OBR.player.getName(); } catch {}
      OBR.broadcast.onMessage(CHANNEL, (event) => {
        const p = event.data;
        if (p && Array.isArray(p.dice)) addLog(p);
      });
    });
  }
</script>
</body>
</html>
